name: CI/CD

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate Docker App
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for backend health
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/api/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend health check did not become ready in time."
          docker compose logs backend
          exit 1

      - name: Check frontend source integrity
        run: docker compose run --rm --no-deps frontend npm run check

      - name: Verify HYG scene endpoint
        run: |
          python3 - <<'PY'
          import json
          import urllib.request

          payload = json.dumps(
              {
                  "latitude": 37.5665,
                  "longitude": 126.9780,
                  "observedAt": "2026-05-13T21:00:00Z",
                  "limitingMagnitude": 4.8,
                  "maxStars": 3200,
              }
          ).encode("utf-8")
          request = urllib.request.Request(
              "http://127.0.0.1:8000/api/sky/scene",
              data=payload,
              headers={"Content-Type": "application/json"},
          )
          with urllib.request.urlopen(request) as response:
              data = json.load(response)

          assert data["summary"]["catalog"] == "HYG v4.2"
          assert data["summary"]["visibleStars"] > 100
          assert data["stars"][0]["name"] != "Sol"
          print("Validated HYG scene:", data["summary"]["visibleStars"], "stars")
          PY

      - name: Show service logs on failure
        if: failure()
        run: docker compose logs --tail=150

      - name: Stop services
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy To Oracle Server
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Add server to known hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" "bash -lc 'cd \"${DEPLOY_PATH}\" && ./scripts/deploy.sh main'"
