name: CI/CD

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    name: Validate Docker App
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for backend health
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/api/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend health check did not become ready in time."
          docker compose logs backend
          exit 1

      - name: Check frontend source integrity
        run: docker compose run --rm --no-deps frontend npm run check

      - name: Verify HYG scene endpoint
        run: |
          python3 - <<'PY'
          import json
          import urllib.request

          payload = json.dumps(
              {
                  "latitude": 37.5665,
                  "longitude": 126.9780,
                  "observedAt": "2026-05-13T21:00:00Z",
                  "limitingMagnitude": 4.8,
                  "maxStars": 3200,
              }
          ).encode("utf-8")
          request = urllib.request.Request(
              "http://127.0.0.1:8000/api/sky/scene",
              data=payload,
              headers={"Content-Type": "application/json"},
          )
          with urllib.request.urlopen(request) as response:
              data = json.load(response)

          assert data["summary"]["catalog"] == "HYG v4.2"
          assert data["summary"]["visibleStars"] > 100
          assert data["stars"][0]["name"] != "Sol"
          print("Validated HYG scene:", data["summary"]["visibleStars"], "stars")
          PY

      - name: Show service logs on failure
        if: failure()
        run: docker compose logs --tail=150

      - name: Stop services
        if: always()
        run: docker compose down -v

  deploy:
    name: Deploy Production (main)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Verify production deploy secrets and path split
        env:
          PROD_DEPLOY_SSH_KEY: ${{ secrets.PROD_DEPLOY_SSH_KEY }}
          PROD_DEPLOY_HOST: ${{ secrets.PROD_DEPLOY_HOST }}
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
          PROD_DEPLOY_PORT: ${{ secrets.PROD_DEPLOY_PORT }}
          PROD_DEPLOY_USER: ${{ secrets.PROD_DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEV_DEPLOY_PATH: ${{ secrets.DEV_DEPLOY_PATH }}
        run: |
          PROD_KEY="${PROD_DEPLOY_SSH_KEY:-$DEPLOY_SSH_KEY}"
          PROD_HOST="${PROD_DEPLOY_HOST:-$DEPLOY_HOST}"
          PROD_PATH="${PROD_DEPLOY_PATH:-$DEPLOY_PATH}"
          PROD_PORT="${PROD_DEPLOY_PORT:-$DEPLOY_PORT}"
          PROD_USER="${PROD_DEPLOY_USER:-$DEPLOY_USER}"

          for key in PROD_KEY PROD_HOST PROD_PATH PROD_PORT PROD_USER; do
            if [ -z "${!key}" ]; then
              echo "Missing required production deploy setting: $key"
              exit 1
            fi
          done

          if [ -n "$DEV_DEPLOY_PATH" ] && [ "$DEV_DEPLOY_PATH" = "$PROD_PATH" ]; then
            echo "Production deploy path and DEV_DEPLOY_PATH must be different."
            exit 1
          fi

          if [ -n "$PROD_DEPLOY_PATH" ]; then
            echo "Using production path from PROD_DEPLOY_PATH."
          else
            echo "PROD_DEPLOY_PATH not set; falling back to DEPLOY_PATH."
          fi

      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure SSH key
        env:
          PROD_DEPLOY_SSH_KEY: ${{ secrets.PROD_DEPLOY_SSH_KEY }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          PROD_KEY="${PROD_DEPLOY_SSH_KEY:-$DEPLOY_SSH_KEY}"
          mkdir -p ~/.ssh
          printf '%s\n' "$PROD_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Add server to known hosts
        env:
          PROD_DEPLOY_HOST: ${{ secrets.PROD_DEPLOY_HOST }}
          PROD_DEPLOY_PORT: ${{ secrets.PROD_DEPLOY_PORT }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          PROD_HOST="${PROD_DEPLOY_HOST:-$DEPLOY_HOST}"
          PROD_PORT="${PROD_DEPLOY_PORT:-$DEPLOY_PORT}"
          ssh-keyscan -p "${PROD_PORT:-22}" -H "$PROD_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          PROD_DEPLOY_HOST: ${{ secrets.PROD_DEPLOY_HOST }}
          PROD_DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
          PROD_DEPLOY_PORT: ${{ secrets.PROD_DEPLOY_PORT }}
          PROD_DEPLOY_USER: ${{ secrets.PROD_DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          PROD_HOST="${PROD_DEPLOY_HOST:-$DEPLOY_HOST}"
          PROD_PATH="${PROD_DEPLOY_PATH:-$DEPLOY_PATH}"
          PROD_PORT="${PROD_DEPLOY_PORT:-$DEPLOY_PORT}"
          PROD_USER="${PROD_DEPLOY_USER:-$DEPLOY_USER}"
          ssh -i ~/.ssh/deploy_key -p "${PROD_PORT:-22}" "${PROD_USER}@${PROD_HOST}" "bash -lc 'cd \"${PROD_PATH}\" && ./scripts/deploy.sh main prod'"

  deploy-dev:
    name: Deploy Development (dev)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'

    steps:
      - name: Verify development deploy secrets
        env:
          DEV_DEPLOY_SSH_KEY: ${{ secrets.DEV_DEPLOY_SSH_KEY }}
          DEV_DEPLOY_HOST: ${{ secrets.DEV_DEPLOY_HOST }}
          DEV_DEPLOY_PATH: ${{ secrets.DEV_DEPLOY_PATH }}
          DEV_DEPLOY_PORT: ${{ secrets.DEV_DEPLOY_PORT }}
          DEV_DEPLOY_USER: ${{ secrets.DEV_DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          for key in DEV_DEPLOY_SSH_KEY DEV_DEPLOY_HOST DEV_DEPLOY_PATH DEV_DEPLOY_PORT DEV_DEPLOY_USER; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              exit 1
            fi
          done
          if [ -n "$DEPLOY_PATH" ] && [ "$DEPLOY_PATH" = "$DEV_DEPLOY_PATH" ]; then
            echo "DEV_DEPLOY_PATH and DEPLOY_PATH must be different."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEV_DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Add server to known hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEV_DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEV_DEPLOY_PORT }}
        run: |
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEV_DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEV_DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEV_DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEV_DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" "bash -lc 'cd \"${DEPLOY_PATH}\" && ./scripts/deploy.sh dev dev'"
