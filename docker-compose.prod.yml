name: zeravue-prod

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        VITE_NASA_API_KEY: ${VITE_NASA_API_KEY:-DEMO_KEY}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-}
    container_name: zeravue-prod-frontend
    ports:
      - "${PROD_FRONTEND_PORT:-5051}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zeravue-prod-backend
    ports:
      - "${PROD_BACKEND_PORT:-5052}:8000"
    environment:
      NASA_API_KEY: ${NASA_API_KEY:-DEMO_KEY}
      NASA_BASE_URL: ${NASA_BASE_URL:-https://api.nasa.gov}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-https://zeravue.xyz}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      ADMIN_DASHBOARD_KEY: ${ADMIN_DASHBOARD_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
