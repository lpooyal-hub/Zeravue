services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:5173"
    environment:
      VITE_NASA_API_KEY: ${VITE_NASA_API_KEY:-DEMO_KEY}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      VITE_PROXY_TARGET: http://backend:8000
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      NASA_API_KEY: ${NASA_API_KEY:-DEMO_KEY}
      NASA_BASE_URL: ${NASA_BASE_URL:-https://api.nasa.gov}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://168.107.51.224:8001}
    volumes:
      - ./backend/app:/app/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  frontend_node_modules:
