name: zeravue-dev

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zeravue-dev-frontend
    ports:
      - "${DEV_FRONTEND_PORT:-8001}:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      VITE_PROXY_TARGET: http://backend:8000
    volumes:
      - .:/app
      - frontend_node_modules_dev:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zeravue-dev-backend
    ports:
      - "${DEV_BACKEND_PORT:-8000}:8000"
    environment:
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://127.0.0.1:${DEV_FRONTEND_PORT:-8001}}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      ADMIN_DASHBOARD_KEY: ${ADMIN_DASHBOARD_KEY:-}
    volumes:
      - ./backend/app:/app/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  frontend_node_modules_dev:
